# LiteLLM translation-proxy config for gpt-5.6-sol.
# The proxy speaks Anthropic's Messages API on localhost and forwards to
# OpenAI; bin/arena-proxy.sh starts it with the OpenAI key pulled from
# ~/.secrets at launch (the key never appears in this file or in the
# contestant's environment).
model_list:
  - model_name: gpt-5.6-sol
    litellm_params:
      model: openai/gpt-5.6-sol
      api_key: os.environ/OPENAI_API_KEY
litellm_settings:
  drop_params: true
  callbacks: ["litellm_usage_logger.usage_logger"]
